
services:
  strapi:
    build:
      context: ./my-strapi-project
      dockerfile: Dockerfile.strapi
    container_name: strapi-blog-cms
    ports:
      - "1337:1337"
    environment:
      - NODE_ENV=development
      - DATABASE_CLIENT=sqlite
      - DATABASE_FILENAME=/app/.tmp/data.db
      - ADMIN_JWT_SECRET=mySecretKey12345
      - JWT_SECRET=myJwtSecret67890
      - APP_KEYS=key1,key2,key3,key4
      - API_TOKEN_SALT=salt123456
    volumes:
      - strapi-data:/app/.tmp
    restart: unless-stopped

  nuxt:
    build:
      context: .
      dockerfile: Dockerfile.nuxt
    container_name: strapi-blog-frontend
    ports:
      - "3000:3000"
    environment:
      - STRAPI_URL=http://strapi:1337
    depends_on:
      - strapi
    restart: unless-stopped

volumes:
  strapi-data: